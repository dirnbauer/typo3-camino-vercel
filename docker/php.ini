memory_limit = 512M
max_execution_time = 240
max_input_vars = 1500
post_max_size = 25M
upload_max_filesize = 20M
upload_tmp_dir = /tmp/typo3/tmp
sys_temp_dir = /tmp/typo3/tmp
session.save_path = /tmp/typo3/php-sessions
expose_php = 0
output_buffering = 4096
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 40000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
; Tracing JIT is stable on PHP 8.4 and typically shaves CPU off warm framework
; requests. Kept modest to avoid competing with opcache SHM.
opcache.jit = tracing
opcache.jit_buffer_size = 64M
; Persistent opcode cache primed at image build time (see Dockerfile.vercel). The
; container filesystem is read-only except /tmp on Vercel, so the shared cache is
; warmed once at build and read by both Apache and the boot CLI scripts, avoiding
; a full recompile of the TYPO3 codebase on each new instance's first request.
opcache.file_cache = /usr/local/share/opcache
opcache.file_cache_consistency_checks = 0
realpath_cache_size = 16384K
realpath_cache_ttl = 3600
