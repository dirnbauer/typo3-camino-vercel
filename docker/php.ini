memory_limit = 512M
max_execution_time = 240
max_input_vars = 1500
; Vercel Functions reject request bodies above 4.5 MB before PHP receives them.
; Leave room for multipart headers; larger editor uploads require direct Blob upload.
post_max_size = 4M
upload_max_filesize = 4M
upload_tmp_dir = /tmp/typo3/tmp
sys_temp_dir = /tmp/typo3/tmp
session.save_path = /tmp/typo3/php-sessions
expose_php = 0
output_buffering = 4096
log_errors = On
error_log = /proc/self/fd/2
; Boot scripts are one-shot processes; without a file cache, CLI opcache is
; compiled into private memory that dies with each process.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 40000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
; TYPO3 spends most request time in framework and I/O work. JIT reserves memory
; but did not improve the measured request path, so keep it off.
opcache.jit = off
opcache.jit_buffer_size = 0
realpath_cache_size = 16384K
realpath_cache_ttl = 3600
zend.assertions = -1
