user www-data;
worker_processes 2;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    server_tokens off;

    client_body_temp_path /tmp/nginx/client_body;
    fastcgi_temp_path /tmp/nginx/fastcgi;
    proxy_temp_path /tmp/nginx/proxy;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 5;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/javascript application/json application/xml image/svg+xml text/css text/plain text/xml;

    server {
        listen 80 default_server;
        root /var/www/html/public;
        index index.php;
        client_max_body_size 4m;

        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # Composer-mode TYPO3 has no physical install.php; the backend's
        # System modules and the standalone Install Tool call this route.
        location = /typo3/install.php {
            rewrite ^ /index.php last;
        }

        location ~ \.php(?:/|$) {
            fastcgi_split_path_info ^(.+?\.php)(/.*)$;
            try_files $fastcgi_script_name =404;
            include /etc/nginx/fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param HTTP_PROXY "";
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_connect_timeout 2s;
            fastcgi_read_timeout 240s;
        }

        location ~* \.vtt$ {
            default_type text/vtt;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri /index.php$is_args$args;
        }

        location ~* \.(?:avif|css|gif|ico|jpe?g|js|mp4|png|svg|webp|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri /index.php$is_args$args;
        }

        location ~ /\.(?!well-known/) {
            deny all;
        }
    }
}
