[global]
pid = /tmp/php-fpm.pid
error_log = /proc/self/fd/2
daemonize = no

[www]
listen = 127.0.0.1:9000
pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 500
clear_env = no
catch_workers_output = yes
decorate_workers_output = no
