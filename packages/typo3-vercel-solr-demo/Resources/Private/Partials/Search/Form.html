<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:if condition="{demoSuggestCatalog}">
    <f:then>
        <f:asset.script identifier="typo3-vercel-solr-demo-suggest" src="EXT:typo3_vercel_solr_demo/Resources/Public/JavaScript/demo_suggest_controller.js" />
    </f:then>
    <f:else>
        <f:asset.script identifier="typo3-vercel-solr-autocomplete" src="EXT:solr/Resources/Public/JavaScript/autocomplete.min.js" />
        <f:asset.script identifier="typo3-vercel-solr-suggest" src="EXT:solr/Resources/Public/JavaScript/suggest_controller.js" />
    </f:else>
</f:if>

<!-- Adapted from EXT:solr Resources/Private/Partials/Search/Form.html. -->
<form
    action="{formAction}"
    method="get"
    class="tx-solr-search-form camino-solr-search__form"
    role="search"
    data-suggest="{suggestUrl}"
    data-suggest-header="{f:translate(key: 'suggest.header', extensionName: 'Typo3VercelSolrDemo')}"
    data-suggest-catalog="{demoSuggestCatalog}"
>
    <label class="sr-only" for="tx-solr-search-field"><f:translate key="search.label" extensionName="Typo3VercelSolrDemo">Search the Camino guide</f:translate></label>
    <div class="input-group camino-solr-search__input-group">
        <span class="camino-solr-search__input-icon" aria-hidden="true">
            <f:render partial="Icons/Search" arguments="{class: 'icon icon--search'}" />
        </span>
        <input
            id="tx-solr-search-field"
            type="search"
            class="tx-solr-q js-solr-q {suggestInputClass} form-control camino-solr-search__input"
            name="tx_solr[q]"
            value="{query}"
            maxlength="50"
            autocomplete="off"
            placeholder="{f:translate(key: 'search.placeholder', extensionName: 'Typo3VercelSolrDemo')}"
        />
        <button class="button tx-solr-submit camino-solr-search__submit" type="submit">
            <span class="button__content"><span class="button__text"><f:translate key="search.submit" extensionName="Typo3VercelSolrDemo">Search</f:translate></span></span>
        </button>
    </div>
</form>

</html>
