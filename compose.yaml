services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.vercel
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://typo3:typo3@db:3306/typo3
      TYPO3_AUTO_SETUP: "1"
      TYPO3_CONTEXT: Development/Docker
      TYPO3_ENCRYPTION_KEY: 8b0f3e41a10d4d2a98e9ee8af52cd9e0f214b725fb08aab8d13cf7d961a0307724d03f61b58f1c0e69a0bc7f34f6018d
      TYPO3_PROJECT_NAME: TYPO3 Camino
      TYPO3_SETUP_ADMIN_EMAIL: admin@example.com
      # Local smoke default only; must satisfy TYPO3's policy (upper/lower/digit/special).
      TYPO3_SETUP_ADMIN_PASSWORD: Change-me-locally-1!
      TYPO3_SETUP_ADMIN_USERNAME: admin
      TYPO3_SETUP_DISTRIBUTION: theme_camino
      TYPO3_TRUSTED_HOSTS_PATTERN: (?:localhost(:[0-9]+)?|127\.0\.0\.1(:[0-9]+)?)
    ports:
      - "8080:80"

  db:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: typo3
      MARIADB_PASSWORD: typo3
      MARIADB_ROOT_PASSWORD: root
      MARIADB_USER: typo3
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - typo3-db:/var/lib/mysql

volumes:
  typo3-db:
