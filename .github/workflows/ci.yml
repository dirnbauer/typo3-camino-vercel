name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render TYPO3 documentation
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/project" \
            -w /project \
            ghcr.io/typo3-documentation/render-guides@sha256:6080cbe815ae702e11a932924cdbcf6ec934fbdf9568931a5ed6bafc4b69959c \
            render \
            --config=Documentation \
            --output=Documentation-GENERATED-temp \
            Documentation
      - name: Reject documentation warnings
        run: test ! -s Documentation-GENERATED-temp/warnings.txt

  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build:blob-upload
      - run: npm run lint:docs
      - name: Verify generated Blob upload bundle
        run: git diff --exit-code -- packages/typo3-vercel-blob-storage/Resources/Public/JavaScript/large-upload.js

  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: curl, dom, gd, intl, mbstring, mysqli, pdo_mysql, pdo_pgsql, pgsql, redis, xmlwriter, zip
          coverage: none
      - uses: ramsey/composer-install@v3
      - run: Build/Scripts/runTests.sh -s all

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.vercel
          push: false
          cache-from: type=gha,scope=typo3
          cache-to: type=gha,mode=max,scope=typo3
      - uses: docker/build-push-action@v6
        with:
          context: services/solr
          file: services/solr/Dockerfile.vercel
          push: false
          cache-from: type=gha,scope=solr
          cache-to: type=gha,mode=max,scope=solr

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [documentation, assets, php, containers]
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check deploy readiness
        id: gate
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo '::notice::Deploy skipped: the VERCEL_TOKEN secret is missing. Create a token at https://vercel.com/account/tokens (scope: webconsulting) and add it with: gh secret set VERCEL_TOKEN'
            exit 0
          fi
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo '::error::VERCEL_ORG_ID / VERCEL_PROJECT_ID secrets are missing (values from .vercel/project.json).'
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        if: steps.gate.outputs.ready == 'true'
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version: '22'
      - run: npm install --global vercel@^54
        if: steps.gate.outputs.ready == 'true'
      - name: Deploy Pro profile to production
        if: steps.gate.outputs.ready == 'true'
        run: scripts/deploy-pro.sh
